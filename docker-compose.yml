# Local full stack: API + Celery worker + MongoDB + Redis (+ optional Flower).
#
# Quick start:
#   cp .env.example .env
#   docker compose up --build
#
# API:     http://localhost:9000/docs
# Flower:  docker compose --profile monitoring up  →  http://localhost:5555

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    command: ["/bin/sh", "/app/scripts/start-api.sh"]
    env_file: .env
    environment:
      MONGODB_URL: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ASSET_BASE_URL: http://localhost:9000
    ports:
      - "9000:9000"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: .
    restart: unless-stopped
    command: ["/bin/sh", "/app/scripts/start-worker.sh"]
    env_file: .env
    environment:
      MONGODB_URL: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  flower:
    profiles: [monitoring]
    build: .
    restart: unless-stopped
    command:
      - celery
      - -A
      - app.tasks.celery_app.celery_app
      - flower
      - --port=5555
      - --basic_auth=${FLOWER_BASIC_AUTH:-admin:flower}
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data:
  uploads_data:
  logs_data:
